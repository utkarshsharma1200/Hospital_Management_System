<!DOCTYPE html>
<html>
<head>
    <title>Payment Gateway | WisdomCore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-lg p-5 mx-auto" style="max-width: 500px; border-radius: 20px;">
            <div class="text-center mb-4">
                <h2 class="text-primary">Payment Portal</h2>
                <p class="text-muted">Hospital Management System</p>
            </div>
            <hr>
            <div class="mb-4">
                <h5>Consultation Fees: <span class="float-end text-success">₹ 500</span></h5>
                <p class="small text-muted">Doctor Appointment Charges</p>
            </div>
            
            <form method="POST" action="/appointment/success/">
                {% csrf_token %}
                <button type="submit" class="btn btn-primary btn-lg w-100 shadow">Pay & Confirm Appointment</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="/appointment/book/" class="text-decoration-none small text-danger">Cancel & Go Back</a>
            </div>
        </div>
    </div>
</body>
</html>
